name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Type Check
        run: npx tsc --noEmit
      - name: Unit Tests
        run: npx vitest run --reporter=verbose
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "file:./prisma/test.db"
          AUTH_SECRET: "test-secret-key-for-ci-only"
